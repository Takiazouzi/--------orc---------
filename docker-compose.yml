services:
  redis:
    image: redis:7-alpine
    container_name: smartdoc_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    container_name: smartdoc_postgres
    environment:
      POSTGRES_USER: smartdoc_user
      POSTGRES_PASSWORD: smartdoc_pass
      POSTGRES_DB: smartdoc_db
    ports:
      - "5433:5432" # Mapped to 5433 to avoid conflict with your existing Keycloak DB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartdoc_user -d smartdoc_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  api-gateway:
    build: ./services/api-gateway
    container_name: smartdoc_api
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./services/api-gateway:/app
      - api_uploads:/app/uploads

  ocr-worker:
    build: ./services/ocr-worker
    container_name: smartdoc_ocr
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./services/ocr-worker:/app
      - api_uploads:/app/uploads

  nlp-worker:
    build: ./services/nlp-worker
    container_name: smartdoc_nlp
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://smartdoc_user:smartdoc_pass@postgres:5432/smartdoc_db
    volumes:
      - ./services/nlp-worker:/app

volumes:
  api_uploads:
