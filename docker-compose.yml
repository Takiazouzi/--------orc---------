version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: smartdoc_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api-gateway:
    build: ./services/api-gateway
    container_name: smartdoc_api
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./services/api-gateway:/app
      - api_uploads:/app/uploads

  ocr-worker:
    build: ./services/ocr-worker
    container_name: smartdoc_ocr
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./services/ocr-worker:/app
      - api_uploads:/app/uploads

volumes:
  api_uploads:
